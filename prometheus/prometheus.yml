global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Spring Boot — nginx를 통해 active 슬롯 자동 라우팅
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['nginx:80']

  # nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # MongoDB
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Oracle XE
  - job_name: 'oracle'
    static_configs:
      - targets: ['oracle-exporter:9161']

  # Prometheus 자체
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
