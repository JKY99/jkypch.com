jenkins:
  systemMessage: "jkypch.com CI/CD"
  numExecutors: 2
  mode: NORMAL
  quietPeriod: 0

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"
        - id: "guest"
          password: "1234"

  authorizationStrategy:
    globalMatrix:
      permissions:
        # admin — 전체 권한
        - "Overall/Administer:admin"
        # guest — 읽기 전용 (잡 상태/코드 조회만 가능, 빌드 실행 불가)
        - "Overall/Read:guest"
        - "Job/Read:guest"
        - "Job/ExtendedRead:guest"
        - "Job/Workspace:guest"

unclassified:
  location:
    url: "http://localhost/jenkins/"

  # GitHub webhook (필요 시 token 추가)
  githubPluginConfig:
    hookUrl: "http://localhost/jenkins/github-webhook/"
