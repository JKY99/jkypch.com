# Docker 내부 DNS resolver (동적 upstream 해석용)
# web-active.conf의 $web_backend 변수를 요청 시마다 resolve
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;

    # Cloudflare Tunnel → 실제 클라이언트 IP 복원
    real_ip_header X-Forwarded-For;
    # Cloudflare IPv4 (https://www.cloudflare.com/ips-v4/)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6 (https://www.cloudflare.com/ips-v6/)
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # Docker 내부 네트워크 (cloudflared → nginx)
    set_real_ip_from 172.0.0.0/8;

    # ── nginx 자체 헬스체크 ──
    location = /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # ── nginx stub_status (exporter 전용, 외부 미노출) ──
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 172.0.0.0/8;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # ── Grafana (/grafana subpath) ──
    set $grafana_backend "grafana:3000";
    location ^~ /grafana {
        proxy_pass            http://$grafana_backend;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Accept-Encoding   "";  # sub_filter를 위해 gzip 비활성화
        # WebSocket (Grafana Live)
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_read_timeout    120s;
        # 모바일 CSS 주입
        sub_filter_once       on;
        sub_filter            '</head>' '<style>@media(max-width:900px){html,body{min-width:0!important;overflow-x:hidden}.react-grid-layout{display:flex!important;flex-wrap:wrap!important;height:auto!important;gap:4px!important;padding:4px!important}.react-grid-item{position:relative!important;transform:none!important;width:calc(50% - 2px)!important;height:90px!important;box-sizing:border-box!important}.react-grid-item:nth-child(6n+1){width:100%!important;height:36px!important}.react-grid-item:nth-child(6n){width:100%!important;height:180px!important}[data-testid="data-testid dashboard controls"]>div>div{display:contents!important}[data-testid="data-testid dashboard controls"]>div>div:first-child{order:1!important}[data-testid="data-testid dashboard controls"]>div>div:last-child{order:0!important}}</style></head>';
    }

    # ── Jenkins (/jenkins prefix) ──
    # 변수 사용: nginx 시작 시 jenkins가 없어도 DNS 오류 방지
    set $jenkins_backend "jenkins:8080";
    location ^~ /jenkins {
        proxy_pass          http://$jenkins_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        # Jenkins redirect 처리
        proxy_redirect      http://jenkins:8080/jenkins $scheme://$host/jenkins;
    }

    # ── 메인 웹 (blue-green, 변수 기반 upstream) ──
    location / {
        proxy_pass          http://$web_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout;
    }

    # 추가 서비스 예시 (파일 추가로 확장):
    # location /pgadmin/  { proxy_pass http://pgadmin:80/; }
    # location /worker/   { proxy_pass http://worker:9000/; }
}
