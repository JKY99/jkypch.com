# Docker 내부 DNS resolver (동적 upstream 해석용)
# web-active.conf의 $web_backend 변수를 요청 시마다 resolve
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name _;

    # Cloudflare Tunnel → 실제 클라이언트 IP 복원
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ── nginx 자체 헬스체크 ──
    location = /health {
        access_log off;
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # ── nginx stub_status (exporter 전용, 외부 미노출) ──
    location = /nginx_status {
        stub_status;
        access_log off;
        allow 172.0.0.0/8;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # ── Grafana (/grafana subpath) ──
    set $grafana_backend "grafana:3000";
    location ^~ /grafana {
        proxy_pass            http://$grafana_backend;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Accept-Encoding   "";  # sub_filter를 위해 gzip 비활성화
        # WebSocket (Grafana Live)
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_read_timeout    120s;
        # 모바일 CSS 주입
        sub_filter_once       on;
        sub_filter            '</head>' '<style>@media(max-width:900px){html,body{min-width:0!important;overflow-x:hidden}.react-grid-layout{display:flex!important;flex-wrap:wrap!important;height:auto!important;gap:4px!important;padding:4px!important}.react-grid-item{position:relative!important;transform:none!important;width:calc(50% - 2px)!important;height:90px!important;box-sizing:border-box!important}.react-grid-item:nth-child(6n+1){width:100%!important;height:36px!important}.react-grid-item:nth-child(6n){width:100%!important;height:180px!important}div:has(>div:has(a[href*="/grafana/d/"])){flex-wrap:wrap!important}div:has(>a[href*="/grafana/d/"]){display:flex!important;flex-direction:row!important;flex-wrap:wrap!important;gap:6px!important;padding:4px 8px!important;width:100%!important;flex-basis:100%!important;order:10!important}div:has(>a[href*="/grafana/d/"]) a{white-space:nowrap!important;font-size:12px!important;padding:4px 10px!important;border-radius:4px!important}}</style></head>';
    }

    # ── Jenkins (/jenkins prefix) ──
    # 변수 사용: nginx 시작 시 jenkins가 없어도 DNS 오류 방지
    set $jenkins_backend "jenkins:8080";
    location ^~ /jenkins {
        proxy_pass          http://$jenkins_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        # Jenkins redirect 처리
        proxy_redirect      http://jenkins:8080/jenkins $scheme://$host/jenkins;
    }

    # ── 메인 웹 (blue-green, 변수 기반 upstream) ──
    location / {
        proxy_pass          http://$web_backend;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout;
    }

    # 추가 서비스 예시 (파일 추가로 확장):
    # location /pgadmin/  { proxy_pass http://pgadmin:80/; }
    # location /worker/   { proxy_pass http://worker:9000/; }
}
